<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>機材紹介 | 鹿児島エアリンク</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 機材紹介ページ専用の追加スタイル */
        .fleet-container {
            position: relative;
            width: 1000px; /* 画像に合わせたワイド設定 */
            height: 500px;
            margin: 40px auto;
            overflow: hidden;
            background: #001a33; /* 画像がない時のフォールバック */
            /* ここに生成したYS-11やドルニエの画像を設置する想定 */
            background-image: url('fleet_dornier.jpg'); 
            background-size: cover;
            background-position: center;
            color: #fff;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        }

        .fleet-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.7) 100%);
            padding: 40px;
            box-sizing: border-box;
        }

        .fleet-header {
            margin-bottom: 50px;
        }

        .fleet-header .label {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .fleet-header h2 {
            font-size: 36px;
            margin: 5px 0;
            font-weight: 500;
        }

        .fleet-name {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            opacity: 0.6;
            letter-spacing: 5px;
            white-space: nowrap;
        }

        .spec-grid {
            position: absolute;
            bottom: 40px;
            width: calc(100% - 80px);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 20px;
        }

        .spec-item {
            margin-bottom: 15px;
        }

        .spec-label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 5px;
        }

        .spec-value {
            font-size: 20px;
            font-weight: 300;
        }

        .spec-value span {
            font-size: 14px;
            margin-left: 5px;
        }

        .spec-footer {
            grid-column: 1 / 4;
            text-align: right;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body style="background-color: #333;"> <div class="fleet-container">
    <div class="fleet-overlay">
        
        <div class="fleet-header">
            <div class="label">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 16.24V7.76a2 2 0 0 0-1.4-1.9L13 4a2 2 0 0 0-2 0L3.4 5.86a2 2 0 0 0-1.4 1.9v8.48a2 2 0 0 0 1.4 1.9L11 20a2 2 0 0 0 2 0l7.6-1.86a2 2 0 0 0 1.4-1.9Z"/>
                </svg>
                Aircraft Information
            </div>
            <h2>機材紹介</h2>
        </div>

        <div class="fleet-name">DORNIER 228-212</div>

        <div class="spec-grid">
            <div class="spec-item">
                <div class="spec-label">エンジン</div>
                <div class="spec-value">Honeywell製 715馬力 × 2</div>
            </div>
            <div class="spec-item">
                <div class="spec-label">巡航速度</div>
                <div class="spec-value">355<span>km / h *</span></div>
            </div>
            <div class="spec-item">
                <div class="spec-label">最大航続距離</div>
                <div class="spec-value">2,485<span>km *</span></div>
            </div>

            <div class="spec-item">
                <div class="spec-label">全長</div>
                <div class="spec-value">16.56<span>m</span></div>
            </div>
            <div class="spec-item">
                <div class="spec-label">全幅</div>
                <div class="spec-value">16.97<span>m</span></div>
            </div>
            <div class="spec-item">
                <div class="spec-label">全高</div>
                <div class="spec-value">4.86<span>m</span></div>
            </div>
            
            <div class="spec-item">
                </div>
            <div class="spec-item">
                <div class="spec-label">乗員</div>
                <div class="spec-value">2<span>名</span></div>
            </div>
            <div class="spec-item">
                <div class="spec-label">乗客</div>
                <div class="spec-value">19<span>名</span></div>
            </div>

            <div class="spec-footer">
                ※搭乗人数・貨物重量・気象条件により変動があります。
            </div>
        </div>

    </div>
</div>

<p style="text-align: center; color: #fff;"><a href="index.html" style="color: #00aaff;">← トップページへ戻る</a></p>

</body>
</html>
